name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "docs/**"
      - "chore/**"
      - "hotfix/**"

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci:check
